name: jca
region: ams
services:
  - name: jca-app
    github:
      repo: Bristimaco/JCA
      branch: main
      deploy_on_push: true
    build_command: |
      composer install --no-dev --optimize-autoloader
      npm ci && npm run build
      php artisan view:cache
    run_command: |
      php artisan config:cache && php artisan route:cache && php artisan migrate --force && heroku-php-apache2 public/
    environment_slug: php
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: APP_NAME
        value: JCA
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        type: SECRET
        value: "${APP_KEY}"
      - key: APP_URL
        value: "${APP_URL}"
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        value: "${db.HOSTNAME}"
      - key: DB_PORT
        value: "${db.PORT}"
      - key: DB_DATABASE
        value: "${db.DATABASE}"
      - key: DB_USERNAME
        value: "${db.USERNAME}"
      - key: DB_PASSWORD
        value: "${db.PASSWORD}"
      - key: DATABASE_URL
        value: "${db.DATABASE_URL}"
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database

databases:
  - name: db
    engine: PG
    production: false
    version: "17"
